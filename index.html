<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>リスペクトリーグ2</title>
<style>
html,body{margin:0;height:100%;background:#17120d;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden;touch-action:none}
#wrap{height:100%;display:flex;align-items:center;justify-content:center}
canvas{width:min(100vw,520px);height:100vh;max-height:900px;background:#111;touch-action:none}
.hint{position:fixed;left:8px;bottom:5px;font-size:11px;color:#ffe8c5;opacity:.85;pointer-events:none}
</style>
</head>
<body>
<div id="wrap"><canvas id="game"></canvas></div>
<div class="hint">リスペクトリーグ2 / B短押し:通常 / B長押し:必殺 / ①②③④で切替・保持中はパス</div>
<script>
(()=>{"use strict";
const canvas=document.getElementById("game"),ctx=canvas.getContext("2d");
const W=420,H=760,DPR=Math.max(1,Math.min(2,window.devicePixelRatio||1));
canvas.width=W*DPR;canvas.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);

const court={x:24,y:88,w:372,h:560};
const goalW=168,goalD=15;
const goalTop={x:W/2-goalW/2,y:court.y-goalD,w:goalW,h:goalD};
const goalBot={x:W/2-goalW/2,y:court.y+court.h,w:goalW,h:goalD};

const teams=[
 {name:"BLIZZARD FOX",scheme:"blue",type:"stripe",main:"#f7f7f7",sub:"#101010",accent:"#6ed5ff",pants:"#111",socks:"#111"},
 {name:"SALVIDA A",scheme:"red",type:"plain",main:"#7a1620",accent:"#7a1620",pants:"#fff",socks:"#fff"},
 {name:"SALVIDA B",scheme:"green",type:"plain",main:"#28c7c9",accent:"#28c7c9",pants:"#fff",socks:"#fff"},
 {name:"TAKE-ZO",scheme:"yellow",type:"hoop",main:"#ff5fb2",sub:"#111b55",pants:"#fff",socks:"#fff"},
 {name:"漫チェスターP",scheme:"mixed",type:"plain",main:"#0b1744",accent:"#0b1744",pants:"#0b1744",socks:"#0b1744"}
];
const col={red:"#ff3030",blue:"#1e90ff",yellow:"#ffd21a",green:"#35d04f",normal:"#fff"};
const label={red:"爆風",blue:"氷結",yellow:"光線",green:"旋風",normal:"通常"};

let screen="title",mode="cup",userTeam=0,cpuTeam=1,randomCpu=true;
let players=[],ball,controlledI=1;
let scoreA=0,scoreB=0,timeLeft=60,lastT=performance.now(),gameOver=false,kickoffTeam=0,kickoffGrace=0,cupRound=0,cupOpponents=[];
let msg="",msgT=0,explosion=null,laser=null;
let input={x:0,y:0,shoot:false,shootRelease:false},btnHold=0;
let pointers={stick:null,b:null};
const stick={cx:82,cy:688,r:54,kx:82,ky:688},btnB={x:374,y:700,r:42};
const numBtns=[{i:1,x:332,y:512},{i:2,x:286,y:560},{i:4,x:378,y:560},{i:3,x:332,y:608}];

function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}
function rnd(a,b){return a+Math.random()*(b-a)}
function show(s,t=.8){msg=s;msgT=t}
function nearest(arr,o){let best=null,bd=1e9;for(const p of arr){let d=dist(p,o);if(d<bd){bd=d;best=p}}return best}
function scheme(team,i){let s=(team===0?teams[userTeam]:teams[cpuTeam]).scheme;return s==="mixed"?["red","blue","yellow","green"][i-1]:s}
function resetBall(){ball={x:W/2,y:court.y+court.h/2,vx:0,vy:0,r:6,owner:null,lastTouch:null,freeT:0,lobT:0,power:0,shotT:0,shotTeam:null,special:"normal",passTarget:null,passT:0,curveSide:1}}
function makePlayer(team,i,x,y,g=false){return{team,i,x,y,tx:x,ty:y,goalie:g,has:false,holdT:0,stun:0,downT:0,freezeT:0,cd:0,dir:team===0?-1:1}}
function formation(){
 players=[];resetBall();let cy=court.y+court.h/2;
 [[0,W/2,court.y+court.h-28,true],[0,W/2,cy-18,false],[0,W/2-108,cy+52,false],[0,W/2,cy+122,false],[0,W/2+108,cy+52,false]].forEach((p,i)=>players.push(makePlayer(p[0],i,p[1],p[2],p[3])));
 [[1,W/2,court.y+28,true],[1,W/2,cy+18,false],[1,W/2-108,cy-52,false],[1,W/2,cy-122,false],[1,W/2+108,cy-52,false]].forEach((p,i)=>players.push(makePlayer(p[0],i,p[1],p[2],p[3])));
 let sp=players.find(p=>p.team===kickoffTeam&&!p.goalie&&p.i===1)||players.find(p=>p.team===kickoffTeam&&!p.goalie);
 sp.x=W/2;sp.y=cy+(kickoffTeam===0?16:-16);give(sp);ball.x=W/2;ball.y=cy;kickoffGrace=.7;if(kickoffTeam!==0)controlledI=3;else controlledI=1;
}
function give(p){players.forEach(q=>{q.has=false;q.holdT=0});p.has=true;p.holdT=0;if(p.team===0&&!p.goalie)controlledI=p.i;ball.owner=p;ball.lastTouch=p.team;ball.vx=ball.vy=0;ball.special="normal";ball.power=0;ball.x=p.x;ball.y=p.y+(p.team===0?-14:14)}
function release(vx,vy,lob=false){if(ball.owner){ball.owner.has=false;ball.owner=null}ball.vx=vx;ball.vy=vy;ball.freeT=.1;ball.lobT=lob?.75:0;ball.passTarget=null;ball.passT=0}
function controlled(){return players.find(p=>p.team===0&&!p.goalie&&p.i===controlledI)||players.find(p=>p.team===0&&!p.goalie)}
function lineBlocked(a,b){let enemies=players.filter(p=>p.team!==a.team&&!p.goalie),dx=b.x-a.x,dy=b.y-a.y,ll=dx*dx+dy*dy||1;for(const e of enemies){let t=clamp(((e.x-a.x)*dx+(e.y-a.y)*dy)/ll,0,1),px=a.x+dx*t,py=a.y+dy*t;if(Math.hypot(e.x-px,e.y-py)<28)return true}return false}
function passTo(a,b){if(!a||!a.has||!b)return;let lob=lineBlocked(a,b),dx=b.x-a.x,dy=(b.y+(b.team===0?-12:12))-a.y,l=Math.hypot(dx,dy)||1;release(dx/l*(lob?4.45:3.95),dy/l*(lob?4.45:3.95),lob);ball.passTarget=b;ball.passT=lob?1.25:1.0;show(lob?"浮き玉パス":"パス",.35)}
function switchOrPass(i){let t=players.find(p=>p.team===0&&!p.goalie&&p.i===i),h=players.find(p=>p.team===0&&!p.goalie&&p.has);if(!t)return;if(h&&h!==t){passTo(h,t);controlledI=i}else{controlledI=i;show(String(i),.25)}}
function cpuPass(p){let mates=players.filter(q=>q.team===p.team&&!q.goalie&&q!==p),t=nearest(mates,{x:W/2,y:p.team===0?p.y-90:p.y+90})||mates[0];passTo(p,t)}

function shoot(p,isSpecial){
 if(!p)return;if(!p.has&&dist(p,ball)<24)give(p);if(!p.has)return;
 let sp=isSpecial?scheme(p.team,p.i):"normal";
 let targetY=p.team===0?goalTop.y:goalBot.y+goalD;
 let targetX=W/2+(input.x>.25?goalW*.30:input.x<-.25?-goalW*.30:rnd(-34,34));
 if(sp==="yellow")targetX=p.x+input.x*26; // ほんの少し角度調整
 if(sp==="green")targetX=input.x>=0?(p.team===0?goalTop.x+goalW*.90:goalBot.x+goalW*.90):(p.team===0?goalTop.x+goalW*.10:goalBot.x+goalW*.10);
 if(p.team===1)targetX=W/2+rnd(-45,45);
 let dx=targetX-p.x,dy=targetY-p.y,l=Math.hypot(dx,dy)||1,spd=10.8;
 if(sp==="red")spd=11.0;if(sp==="blue")spd=14.0;if(sp==="yellow")spd=16.4;if(sp==="green")spd=7.0;
 if(ball.owner){ball.owner.has=false;ball.owner=null}
 ball.vx=dx/l*spd;ball.vy=dy/l*spd;ball.freeT=.08;ball.lobT=0;ball.power=1;ball.shotT=sp==="yellow"?.36:1.05;ball.shotTeam=p.team;ball.special=sp;ball.curveSide=targetX>=W/2?1:-1;
 show(label[sp]||"シュート",.55)
}
function redImpact(first){explosion={x:first.x,y:first.y,t:.5};for(const p of players){if(dist(p,first)<66){let dx=p.x-ball.x,dy=p.y-ball.y,l=Math.hypot(dx,dy)||1;p.x=clamp(p.x+dx/l*40,court.x+10,court.x+court.w-10);p.y=clamp(p.y+dy/l*40,court.y+8,court.y+court.h-8);p.downT=10;p.stun=10}}ball.vx*=-.45;ball.vy*=-.45;ball.power=0;ball.special="normal";show("爆風!",.6)}
function laserHit(){let sx=ball.x,sy=ball.y,ey=ball.shotTeam===0?court.y-35:court.y+court.h+35,angleX=ball.vx/(Math.abs(ball.vy)||1),block=null,best=1e9;for(const p of players){if(p.team===ball.shotTeam)continue;let t=(p.y-sy)/(ey-sy);if(t>0&&t<1){let lx=sx+(p.y-sy)*angleX;if(Math.abs(p.x-lx)<26){let d=Math.abs(p.y-sy);if(d<best){best=d;block=p}}}}let hy=block?block.y:ey,hx=sx+(hy-sy)*angleX;laser={x1:sx,y1:sy,x2:hx,y2:hy,t:.35};if(block){
 block.downT=block.goalie?1.2:3.0;
 block.stun=block.downT;
 ball.x=hx;ball.y=hy;
 // 跳ね返りは少しキッカー側へ戻りやすくする
 const kicker=players.find(p=>p.team===ball.shotTeam&&p.has===false&&!p.goalie) || nearest(players.filter(p=>p.team===ball.shotTeam&&!p.goalie),ball);
 if(kicker){
   const dx=kicker.x-ball.x,dy=kicker.y-ball.y,l=Math.hypot(dx,dy)||1;
   ball.vx=dx/l*4.8+rnd(-1.2,1.2);
   ball.vy=dy/l*4.8+rnd(-1.2,1.2);
 } else {
   ball.vx=rnd(-3.5,3.5);ball.vy*=-.45;
 }
 ball.power=0;ball.special="normal";ball.shotT=.25;
 show(block.goalie?"レーザーセーブ":"レーザー直撃!",.5)
}else{ball.x=hx;ball.y=hy;ball.power=0;ball.special="normal";ball.shotT=0;show("レーザー",.4)}}
function shotHits(){if(ball.owner||ball.shotT<=0)return;if(ball.special==="yellow"){laserHit();return}for(const p of players){if(p.team===ball.shotTeam||p.downT>0)continue;if(dist(p,ball)<(p.goalie?28:20)){let speed=Math.hypot(ball.vx,ball.vy)||1,nx=ball.vx/speed,ny=ball.vy/speed;if(ball.special==="red"){redImpact(p);return}if(ball.special==="blue"){p.freezeT=5;p.stun=5;ball.x+=nx*14;ball.y+=ny*14;ball.vx*=.92;ball.vy*=.92;ball.special="normal";show("氷結",.5);return}p.downT=p.goalie?1.2:1;p.stun=p.downT;ball.vx=nx*5+rnd(-3,3);ball.vy=ny*5+rnd(-3,3);ball.power=0;ball.special="normal";ball.shotT=.25;show("ヒット",.3);return}}}


function tryCounterShot(p){
 if(ball.owner||ball.power<=0)return false;
 // 守備側の味方で、ボールに一番近い選手が打ち返しに行く
 const team = ball.shotTeam===0 ? 1 : 0;
 if(team!==0)return false; // 今回はプレイヤー側の打ち返しを優先実装
 let candidates=players.filter(q=>q.team===0&&!q.goalie&&q.downT<=0&&q.freezeT<=0&&q.stun<=0);
 let defender=nearest(candidates,ball);
 if(!defender)return false;
 const range = ball.special==="yellow" ? 72 : 58;
 if(dist(defender,ball)>range)return false;

 const sp=scheme(defender.team,defender.i);
 let targetY=defender.team===0?goalTop.y:goalBot.y+goalD;
 let targetX=W/2+(input.x>.25?goalW*.25:input.x<-.25?-goalW*.25:0);
 if(sp==="yellow")targetX=defender.x+input.x*24;
 if(sp==="green")targetX=input.x>=0?(defender.team===0?goalTop.x+goalW*.90:goalBot.x+goalW*.90):(defender.team===0?goalTop.x+goalW*.10:goalBot.x+goalW*.10);
 let dx=targetX-defender.x,dy=targetY-defender.y,l=Math.hypot(dx,dy)||1;
 let spd=11;
 if(sp==="red")spd=11.0;if(sp==="blue")spd=14.0;if(sp==="yellow")spd=16.4;if(sp==="green")spd=7.0;

 ball.x=defender.x;
 ball.y=defender.y+(defender.team===0?-12:12);
 ball.vx=dx/l*spd;
 ball.vy=dy/l*spd;
 ball.freeT=.08;
 ball.lobT=0;
 ball.power=1;
 ball.shotT=sp==="yellow"?.36:1.05;
 ball.shotTeam=defender.team;
 ball.special=sp;
 ball.curveSide=targetX>=W/2?1:-1;
 controlledI=defender.i;
 defender.stun=.12;
 show("必殺カウンター!",.65);
 return true;
}
function update(dt){
 if(screen!=="play"||gameOver)return;
 timeLeft-=dt;if(timeLeft<=0){timeLeft=0;gameOver=true;screen="result";return}
 msgT=Math.max(0,msgT-dt);kickoffGrace=Math.max(0,kickoffGrace-dt);if(explosion){explosion.t-=dt;if(explosion.t<=0)explosion=null}if(laser){laser.t-=dt;if(laser.t<=0)laser=null}
 for(const p of players){p.cd=Math.max(0,p.cd-dt);p.stun=Math.max(0,p.stun-dt);p.downT=Math.max(0,p.downT-dt);p.freezeT=Math.max(0,p.freezeT-dt);if(p.has)p.holdT+=dt;else p.holdT=0;if(p.goalie&&p.has&&p.holdT>.55&&p.cd<=0){cpuPass(p);p.cd=.9}}
 let u=controlled();if(input.shoot){btnHold+=dt;if(ball.power>0&&ball.shotTeam!==0){if(tryCounterShot(u)){input.shoot=false;input.shootRelease=false;btnHold=0;}}}if(input.shootRelease){
 if(!tryCounterShot(u)){
   if(u.has||dist(u,ball)<25)shoot(u,btnHold>.27);
 }
 input.shootRelease=false;btnHold=0
}
 ai(dt);movePlayers(dt,u);moveBall(dt);
}
function shapeSpot(team,i,has){let cy=court.y+court.h/2,dir=team===0?-1:1,base=has?(team===0?ball.y+58:ball.y-58):(team===0?cy+70:cy-70),s={1:{x:W/2,y:base+dir*96},2:{x:W/2-118,y:base},3:{x:W/2,y:base-dir*92},4:{x:W/2+118,y:base}};return{x:clamp(s[i].x,court.x+28,court.x+court.w-28),y:clamp(s[i].y,court.y+42,court.y+court.h-42)}}
function ai(dt){let hasA=players.some(p=>p.team===0&&p.has),hasB=players.some(p=>p.team===1&&p.has);for(const p of players){if(p.goalie){if(p.has){p.tx=p.x;p.ty=p.y;continue}let o=ball.owner,enemy=o&&o.team!==p.team,dy=p.team===0?court.y+court.h-115:court.y+115;if(enemy&&(p.team===0?o.y>dy:o.y<dy)&&Math.abs(o.x-p.x)<78){p.tx=o.x;p.ty=o.y+(p.team===0?22:-22)}else{p.tx=clamp(ball.x,court.x+88,court.x+court.w-88);p.ty=p.team===0?court.y+court.h-24:court.y+24}continue}if(p.team===0&&p===controlled())continue;if(p.team===1&&p.has){p.tx=W/2;p.ty=goalBot.y;if(p.cd<=0&&p.y>court.y+court.h-145){shoot(p,Math.random()<.45);p.cd=1.1}else if(p.cd<=0&&Math.random()<.02){cpuPass(p);p.cd=.8}continue}let hs=p.team===0?hasA:hasB,spot=shapeSpot(p.team,p.i,hs),chase=(!ball.owner&&dist(p,ball)<95)?.34:.08;p.tx=clamp(spot.x*(1-chase)+ball.x*chase,court.x+22,court.x+court.w-22);p.ty=clamp(spot.y*(1-chase)+ball.y*chase,court.y+34,court.y+court.h-34)}if(ball.passTarget&&!ball.owner&&ball.passT>0){ball.passTarget.tx=ball.x;ball.passTarget.ty=ball.y}}
function movePlayers(dt,user){for(const p of players){if(p.freezeT>0||p.downT>0||p.stun>0)continue;let ax=0,ay=0,spd=p.goalie?1.85:1.92;if(!p.goalie&&(p.i===2||p.i===4))spd=2.25;if(p===user){ax=input.x;ay=input.y}else{let dx=p.tx-p.x,dy=p.ty-p.y,l=Math.hypot(dx,dy);if(l>1){ax=dx/l;ay=dy/l}}if(p!==user&&!p.goalie){for(const q of players){if(q===p||q.team!==p.team||q.goalie||q===user)continue;let dx=p.x-q.x,dy=p.y-q.y,d=Math.hypot(dx,dy)||1;if(d<54){ax+=dx/d*.65;ay+=dy/d*.65}}}p.x=clamp(p.x+ax*spd*60*dt,court.x+10,court.x+court.w-10);p.y=clamp(p.y+ay*spd*60*dt,court.y+8,court.y+court.h-8);if(Math.abs(ax)+Math.abs(ay)>.05)p.dir=ax||p.dir;if(!ball.owner&&kickoffGrace<=0&&ball.freeT<=0&&ball.lobT<=0&&(!ball.passTarget||p===ball.passTarget||ball.passT<=0)&&dist(p,ball)<(p.goalie?26:18))give(p)}}

function cancelCyclone(){
 if(ball.special==="green"){
   ball.special="normal";
   ball.power=0;
   ball.shotT=.2;
   show("サイクロン解除",.35);
 }
}

function moveBall(dt){if(ball.owner){ball.x=ball.owner.x;ball.y=ball.owner.y+(ball.owner.team===0?-14:14);return}ball.freeT=Math.max(0,ball.freeT-dt);ball.lobT=Math.max(0,ball.lobT-dt);ball.shotT=Math.max(0,ball.shotT-dt);ball.passT=Math.max(0,ball.passT-dt);if(ball.passTarget&&ball.passT>0){let tx=ball.passTarget.x,ty=ball.passTarget.y+(ball.passTarget.team===0?-12:12),d=Math.hypot(tx-ball.x,ty-ball.y);if(d<80){ball.vx+=(tx-ball.x)*.0015;ball.vy+=(ty-ball.y)*.0015}}if(ball.special==="green"&&ball.power>0){ball.vx+=input.x*.34;ball.vy+=input.y*.24;if(input.y<-.25){ball.vx*=1.012;ball.vy*=1.016}if(input.y>.25){ball.vx*=.984;ball.vy*=.984}}ball.x+=ball.vx*60*dt;ball.y+=ball.vy*60*dt;if(ball.special==="green"&&ball.power>0){let a=performance.now()/50;ball.vx+=Math.cos(a)*.55;ball.vy+=Math.sin(a)*.34;for(const p of players){if(p.goalie)continue;let d=dist(p,ball);if(d<76){let dx=p.x-ball.x,dy=p.y-ball.y,l=Math.hypot(dx,dy)||1;p.x=clamp(p.x+dx/l*(78-d)*.045,court.x+10,court.x+court.w-10);p.y=clamp(p.y+dy/l*(78-d)*.045,court.y+8,court.y+court.h-8);p.stun=Math.max(p.stun,.08)}}}else if(ball.power>0)ball.vx+=(W/2-ball.x)*.0006;if(ball.passTarget&&ball.passT>0&&dist(ball.passTarget,ball)<30&&ball.lobT<=0){give(ball.passTarget);ball.passTarget=null;return}shotHits();ball.vx*=Math.pow(ball.power>0?.993:.985,60*dt);ball.vy*=Math.pow(ball.power>0?.993:.985,60*dt);if(ball.shotT<=0&&ball.power>0){ball.power=0;ball.special="normal"}if(ball.y-ball.r<=court.y&&ball.x>goalTop.x-ball.r&&ball.x<goalTop.x+goalW+ball.r){goal(0);return}if(ball.y+ball.r>=court.y+court.h&&ball.x>goalBot.x-ball.r&&ball.x<goalBot.x+goalW+ball.r){goal(1);return}if(ball.x<court.x+ball.r){cancelCyclone();ball.x=court.x+ball.r;ball.vx=Math.abs(ball.vx)*.7}if(ball.x>court.x+court.w-ball.r){cancelCyclone();ball.x=court.x+court.w-ball.r;ball.vx=-Math.abs(ball.vx)*.7}if(ball.y<court.y+ball.r){cancelCyclone();ball.y=court.y+ball.r;ball.vy=Math.abs(ball.vy)*.7}if(ball.y>court.y+court.h-ball.r){cancelCyclone();ball.y=court.y+court.h-ball.r;ball.vy=-Math.abs(ball.vy)*.7}goalieSave()}
function goalieSave(){for(const g of players.filter(p=>p.goalie)){if(!ball.owner&&dist(g,ball)<31&&((g.team===1&&ball.vy<0)||(g.team===0&&ball.vy>0))&&Math.random()<.44){cancelCyclone();let side=ball.x<g.x?-1:1;ball.vx=side*(5.5+rnd(0,2.2));ball.vy*=-.1;g.downT=.85;show("セーブ",.4)}}}
function goal(team){if(team===0){scoreA++;kickoffTeam=1}else{scoreB++;kickoffTeam=0}show(`${teams[team===0?userTeam:cpuTeam].name} GOAL!`,1.2);formation()}

function draw(){ctx.clearRect(0,0,W,H);drawBg();if(screen==="title"){drawTitle();return}if(screen==="champion"){drawChampion();return}if(screen==="select"){drawSelect();return}drawCourt();drawPlayers();drawBall();drawEffects();drawUi();if(screen==="result")drawResult()}
function drawBg(){ctx.fillStyle="#1b1611";ctx.fillRect(0,0,W,H)}
function drawCourt(){ctx.fillStyle="#c99056";ctx.fillRect(court.x,court.y,court.w,court.h);for(let y=court.y;y<court.y+court.h;y+=28){ctx.fillStyle=((y-court.y)/28|0)%2?"rgba(115,65,25,.12)":"rgba(255,230,180,.10)";ctx.fillRect(court.x,y,court.w,28)}ctx.strokeStyle="#fff3d2";ctx.lineWidth=3;ctx.strokeRect(court.x,court.y,court.w,court.h);ctx.beginPath();ctx.moveTo(court.x,court.y+court.h/2);ctx.lineTo(court.x+court.w,court.y+court.h/2);ctx.stroke();ctx.beginPath();ctx.arc(W/2,court.y+court.h/2,54,0,Math.PI*2);ctx.stroke();ctx.fillStyle="#333";ctx.fillRect(goalTop.x,goalTop.y,goalW,goalD);ctx.fillRect(goalBot.x,goalBot.y,goalW,goalD);ctx.strokeStyle="#fff";ctx.strokeRect(goalTop.x,goalTop.y,goalW,goalD);ctx.strokeRect(goalBot.x,goalBot.y,goalW,goalD)}
function drawP(p){let t=teams[p.team===0?userTeam:cpuTeam],sp=scheme(p.team,p.i);ctx.save();ctx.translate(p.x,p.y);if(p.downT>0)ctx.rotate(Math.PI/2*(p.dir>=0?1:-1));ctx.fillStyle=p.goalie?"#222":t.socks;ctx.fillRect(-7,8,5,9);ctx.fillRect(2,8,5,9);if(!p.goalie){ctx.fillStyle=col[sp];ctx.fillRect(-8,16,7,4);ctx.fillRect(2,16,7,4)}ctx.fillStyle=p.goalie?"#222":t.pants;ctx.fillRect(-8,3,16,8);if(p.goalie){ctx.fillStyle=p.team===0?"#e52b2b":"#ffd21a";ctx.fillRect(-10,-13,20,18);ctx.fillRect(-14,-10,5,12);ctx.fillRect(9,-10,5,12)}else if(t.type==="stripe"){ctx.fillStyle=t.main;ctx.fillRect(-9,-12,18,17);ctx.fillStyle=t.sub;ctx.fillRect(-5,-12,4,17);ctx.fillRect(3,-12,4,17);ctx.fillStyle=t.accent;ctx.fillRect(-12,-10,4,10);ctx.fillRect(8,-10,4,10)}else if(t.type==="hoop"){ctx.fillStyle=t.main;ctx.fillRect(-9,-12,18,17);ctx.fillStyle=t.sub;ctx.fillRect(-9,-5,18,6);ctx.fillRect(-9,-12,18,5)}else{ctx.fillStyle=t.main;ctx.fillRect(-9,-12,18,17);ctx.fillRect(-12,-10,4,10);ctx.fillRect(8,-10,4,10)}ctx.fillStyle="#f0bf8e";ctx.beginPath();ctx.arc(0,-18,7,0,Math.PI*2);ctx.fill();ctx.fillStyle="#111";ctx.font="8px monospace";ctx.textAlign="center";ctx.fillText(p.goalie?"G":p.i,0,-1);if(p.team===0&&!p.goalie&&p.i===controlledI){ctx.strokeStyle="#fff";ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,0,18,0,Math.PI*2);ctx.stroke()}if(p.freezeT>0){ctx.strokeStyle="#8fd3ff";ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,14,0,Math.PI*2);ctx.stroke()}ctx.restore()}
function drawPlayers(){players.forEach(drawP)}
function drawBall(){let lift=ball.lobT>0?16*Math.sin((ball.lobT/.75)*Math.PI):0;if(ball.power>0&&!ball.owner){ctx.strokeStyle=col[ball.special]||"#fff";ctx.lineWidth=ball.special==="green"?5:3;ctx.beginPath();ctx.moveTo(ball.x-ball.vx*3,ball.y-ball.vy*3);ctx.lineTo(ball.x,ball.y);ctx.stroke()}if(ball.special==="green"){ctx.strokeStyle="rgba(40,255,80,.65)";ctx.lineWidth=2;for(let i=0;i<6;i++){let a=performance.now()/80+i*2.1;ctx.beginPath();ctx.arc(ball.x,ball.y-lift,10+i*5,a,a+Math.PI*1.75);ctx.stroke()}}ctx.fillStyle=col[ball.special]||"#fff";ctx.beginPath();ctx.arc(ball.x,ball.y-lift,ball.r,0,Math.PI*2);ctx.fill();ctx.strokeStyle="#222";ctx.stroke()}
function drawEffects(){if(laser){ctx.save();ctx.globalAlpha=Math.max(0,laser.t/.35);ctx.strokeStyle="rgba(255,240,30,.95)";ctx.lineWidth=8;ctx.beginPath();ctx.moveTo(laser.x1,laser.y1);ctx.lineTo(laser.x2,laser.y2);ctx.stroke();ctx.strokeStyle="rgba(255,255,220,.95)";ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(laser.x1,laser.y1);ctx.lineTo(laser.x2,laser.y2);ctx.stroke();ctx.restore()}if(explosion){let r=(.5-explosion.t)/.5*70;ctx.fillStyle="rgba(255,40,30,.25)";ctx.beginPath();ctx.arc(explosion.x,explosion.y,r,0,Math.PI*2);ctx.fill();ctx.strokeStyle="rgba(255,80,40,.85)";ctx.lineWidth=4;ctx.beginPath();ctx.arc(explosion.x,explosion.y,r,0,Math.PI*2);ctx.stroke()}}
function drawUi(){ctx.fillStyle="#111";ctx.fillRect(0,0,W,78);ctx.fillStyle="#fff";ctx.textAlign="center";ctx.font="bold 18px system-ui";ctx.fillText(mode==="cup"?`リスペクトリーグ2 R${cupRound+1}`:"リスペクトリーグ2",W/2,23);ctx.font="bold 16px system-ui";ctx.fillText(`${teams[userTeam].name} ${scoreA} - ${scoreB} ${teams[cpuTeam].name}`,W/2,50);ctx.font="13px system-ui";ctx.fillText(`0:${String(Math.floor(timeLeft%60)).padStart(2,"0")}`,W/2,70);if(msgT>0){ctx.fillStyle="rgba(0,0,0,.55)";ctx.fillRect(88,328,244,52);ctx.fillStyle="#fff";ctx.font="bold 22px system-ui";ctx.fillText(msg,W/2,362)}drawCounterHint();drawControls();drawNumBtns();drawCharge()}
function drawCounterHint(){
 if(screen!=="play"||!ball.power||ball.shotTeam===0)return;
 const mates=players.filter(p=>p.team===0&&!p.goalie&&p.downT<=0&&p.freezeT<=0&&p.stun<=0);
 const d=nearest(mates,ball);
 if(d&&dist(d,ball)<78){
   ctx.strokeStyle="rgba(255,255,255,.85)";
   ctx.lineWidth=3;
   ctx.beginPath();ctx.arc(d.x,d.y,24,0,Math.PI*2);ctx.stroke();
   ctx.fillStyle="rgba(0,0,0,.55)";
   ctx.fillRect(116,292,188,28);
   ctx.fillStyle="#fff";
   ctx.font="bold 14px system-ui";
   ctx.textAlign="center";
   ctx.fillText("Bで打ち返し!",W/2,312);
 }
}
function drawControls(){ctx.globalAlpha=.55;ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(stick.cx,stick.cy,stick.r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=.8;ctx.fillStyle="#ddd";ctx.beginPath();ctx.arc(stick.kx,stick.ky,24,0,Math.PI*2);ctx.fill();ctx.globalAlpha=.72;ctx.fillStyle="#ffe5e5";ctx.beginPath();ctx.arc(btnB.x,btnB.y,btnB.r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;ctx.fillStyle="#222";ctx.font="bold 24px system-ui";ctx.textAlign="center";ctx.fillText("B",btnB.x,btnB.y+8)}
function drawNumBtns(){for(const b of numBtns){let sp=scheme(0,b.i);ctx.fillStyle=col[sp];ctx.beginPath();ctx.arc(b.x,b.y,23,0,Math.PI*2);ctx.fill();ctx.strokeStyle=b.i===controlledI?"#fff":"#111";ctx.lineWidth=b.i===controlledI?5:2;ctx.stroke();ctx.fillStyle="#111";ctx.font="bold 15px system-ui";ctx.textAlign="center";ctx.fillText(String(b.i),b.x,b.y+5)}}
function drawCharge(){if(!input.shoot||screen!=="play")return;let u=controlled(),sp=scheme(0,u.i),r=12+Math.min(18,btnHold*55);ctx.strokeStyle=btnHold>.27?col[sp]:"rgba(255,255,255,.75)";ctx.lineWidth=3;ctx.beginPath();ctx.arc(u.x,u.y,r,0,Math.PI*2);ctx.stroke();if(btnHold>.27){ctx.fillStyle="rgba(0,0,0,.5)";ctx.fillRect(btnB.x-42,btnB.y-62,84,24);ctx.fillStyle="#fff";ctx.font="bold 13px system-ui";ctx.textAlign="center";ctx.fillText("必殺OK",btnB.x,btnB.y-45)}}

function drawChampion(){
 ctx.fillStyle="#101010";ctx.fillRect(0,0,W,H);
 ctx.fillStyle="#c99056";ctx.fillRect(30,110,W-60,500);
 ctx.fillStyle="rgba(0,0,0,.25)";ctx.fillRect(30,110,W-60,500);
 ctx.textAlign="center";ctx.fillStyle="#fff";
 ctx.font="bold 42px system-ui";ctx.fillText("🏆",W/2,220);
 ctx.font="bold 30px system-ui";ctx.fillText("CHAMPION!!",W/2,285);
 ctx.font="bold 22px system-ui";ctx.fillText(teams[userTeam].name,W/2,330);
 ctx.font="14px system-ui";ctx.fillText("Respect League Cup Winner",W/2,365);
 ctx.fillStyle="#fff3c2";roundRect(92,450,236,54,14,true);ctx.fillStyle="#111";ctx.font="bold 19px system-ui";ctx.fillText("もう一周",W/2,484);
 ctx.fillStyle="rgba(255,255,255,.9)";roundRect(92,522,236,44,12,true);ctx.fillStyle="#111";ctx.font="bold 18px system-ui";ctx.fillText("チーム選択へ",W/2,551);
}

function drawResult(){ctx.fillStyle="rgba(0,0,0,.68)";ctx.fillRect(0,0,W,H);ctx.fillStyle="#fff";ctx.textAlign="center";ctx.font="bold 32px system-ui";ctx.fillText("FULL TIME",W/2,250);ctx.font="bold 34px system-ui";ctx.fillText(`${scoreA} - ${scoreB}`,W/2,340);ctx.font="bold 24px system-ui";ctx.fillText(scoreA>scoreB?"WIN!":scoreA<scoreB?"LOSE":"DRAW",W/2,400);ctx.fillStyle="#fff3c2";roundRect(92,500,236,54,14,true);ctx.fillStyle="#111";ctx.font="bold 20px system-ui";ctx.fillText((mode==="cup"&&scoreA>scoreB)?"次へ":"もう一度プレイ",W/2,535);ctx.fillStyle="rgba(255,255,255,.9)";roundRect(92,574,236,44,12,true);ctx.fillStyle="#111";ctx.font="bold 18px system-ui";ctx.fillText("チーム選択へ",W/2,603)}

function drawTitle(){
 ctx.fillStyle="#101010";ctx.fillRect(0,0,W,H);
 ctx.fillStyle="#c99056";ctx.fillRect(30,92,W-60,560);
 ctx.fillStyle="rgba(0,0,0,.25)";ctx.fillRect(30,92,W-60,560);
 ctx.strokeStyle="#fff3d2";ctx.lineWidth=3;ctx.strokeRect(42,106,W-84,532);
 ctx.textAlign="center";
 ctx.fillStyle="#fff";ctx.font="bold 30px system-ui";ctx.fillText("⚽ RESPECT LEAGUE 2 ⚽",W/2,170);
 ctx.font="bold 18px system-ui";ctx.fillText("Ultimate Futsal Cup",W/2,202);
 ctx.fillStyle="#fff3c2";ctx.font="bold 14px system-ui";ctx.fillText("必殺技フットサル",W/2,230);
 ctx.fillStyle="#fff";ctx.font="bold 20px system-ui";
 roundRect(82,300,256,52,14,true);ctx.fillStyle="#111";ctx.fillText("🏆 CUP MODE",W/2,333);
 ctx.fillStyle="rgba(255,255,255,.92)";roundRect(82,370,256,52,14,true);ctx.fillStyle="#111";ctx.fillText("⚽ FREE MATCH",W/2,403);
 ctx.fillStyle="rgba(255,255,255,.78)";roundRect(82,440,256,44,12,true);ctx.fillStyle="#111";ctx.font="bold 16px system-ui";ctx.fillText("TEAM SELECT",W/2,468);
 ctx.fillStyle="#ffe8c5";ctx.font="12px system-ui";ctx.fillText("Ver.0.5a  © 2026 pixypickles",W/2,610);
 ctx.font="11px system-ui";ctx.fillText("B短押し:通常 / B長押し:必殺 / ①②③④でパス＆切替",W/2,632);
}

function drawSelect(){ctx.fillStyle="#c99056";ctx.fillRect(30,90,W-60,600);ctx.fillStyle="rgba(0,0,0,.18)";ctx.fillRect(30,90,W-60,600);ctx.fillStyle="#fff";ctx.textAlign="center";ctx.font="bold 30px system-ui";ctx.fillText(mode==="cup"?"🏆 CUP MODE":"⚽ FREE MATCH",W/2,138);ctx.font="15px system-ui";ctx.fillText("自チームを選択",W/2,166);teams.forEach((t,i)=>{let y=184+i*42;ctx.fillStyle=i===userTeam?"#fff5c0":"rgba(255,255,255,.88)";roundRect(58,y,304,34,10,true);ctx.fillStyle="#111";ctx.font="bold 15px system-ui";ctx.fillText(t.name,W/2,y+23)});ctx.fillStyle="#fff";ctx.fillText("対戦相手",W/2,418);ctx.fillStyle=randomCpu?"#fff5c0":"rgba(255,255,255,.88)";roundRect(58,436,304,34,10,true);ctx.fillStyle="#111";ctx.fillText("ランダム",W/2,459);teams.forEach((t,i)=>{let y=478+i*28;if(i===userTeam)return;ctx.fillStyle=!randomCpu&&i===cpuTeam?"#fff5c0":"rgba(255,255,255,.88)";roundRect(58,y,304,24,8,true);ctx.fillStyle="#111";ctx.font="bold 13px system-ui";ctx.fillText(t.name,W/2,y+17)});const desc=["❄ フリーズ軍団","💥 爆風パワー","🌪 サイクロン技巧派","⚡ レーザー砲台","🌈 4色オールラウンダー"][userTeam];
ctx.fillStyle="rgba(0,0,0,.35)";roundRect(58,615,304,24,8,true);ctx.fillStyle="#fff";ctx.font="bold 13px system-ui";ctx.fillText(desc,W/2,632);
ctx.fillStyle="#111";roundRect(94,646,232,38,12,true);ctx.fillStyle="#fff";ctx.font="bold 18px system-ui";ctx.fillText("START",W/2,672)}
function roundRect(x,y,w,h,r,fill){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);fill?ctx.fill():ctx.stroke()}
function loop(t){let dt=Math.min(.033,(t-lastT)/1000);lastT=t;update(dt);draw();requestAnimationFrame(loop)}
function pos(e){let r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*W/r.width,y:(e.clientY-r.top)*H/r.height}}

function setupCup(){
 cupOpponents=teams.map((_,i)=>i).filter(i=>i!==userTeam);
 cupRound=0;
 cpuTeam=cupOpponents[cupRound]||((userTeam+1)%teams.length);
}
function nextCupOpponent(){
 cupRound++;
 if(cupRound>=cupOpponents.length){screen="champion";return}
 cpuTeam=cupOpponents[cupRound];
 scoreA=scoreB=0;timeLeft=60;gameOver=false;kickoffTeam=0;controlledI=1;formation();screen="play";show("ROUND "+(cupRound+1),1);
}

function handleSelect(p){teams.forEach((t,i)=>{let y=184+i*42;if(p.x>58&&p.x<362&&p.y>y&&p.y<y+34){userTeam=i;if(cpuTeam===userTeam)cpuTeam=(i+1)%teams.length}});if(p.x>58&&p.x<362&&p.y>436&&p.y<470)randomCpu=true;teams.forEach((t,i)=>{let y=478+i*28;if(i!==userTeam&&p.x>58&&p.x<362&&p.y>y&&p.y<y+24){randomCpu=false;cpuTeam=i}});if(p.x>94&&p.x<326&&p.y>646&&p.y<684){if(mode==="cup"){setupCup()}else if(randomCpu){let a=teams.map((_,i)=>i).filter(i=>i!==userTeam);cpuTeam=a[Math.floor(Math.random()*a.length)]}scoreA=scoreB=0;timeLeft=60;gameOver=false;kickoffTeam=0;controlledI=1;formation();screen="play";show("KICK OFF",1)}}
function handleResult(p){if(p.x>92&&p.x<328&&p.y>500&&p.y<554){
 if(mode==="cup"&&scoreA>scoreB){nextCupOpponent()}
 else {scoreA=scoreB=0;timeLeft=60;gameOver=false;kickoffTeam=0;formation();screen="play"}
}if(p.x>92&&p.x<328&&p.y>574&&p.y<618){screen="select"}}
function down(e){e.preventDefault();let p=pos(e);if(screen==="title"){
   if(p.x>82&&p.x<338&&p.y>300&&p.y<352){mode="cup";screen="select";return}
   if(p.x>82&&p.x<338&&p.y>370&&p.y<422){mode="free";screen="select";return}
   if(p.x>82&&p.x<338&&p.y>440&&p.y<484){screen="select";return}
   return
 }if(screen==="select"){handleSelect(p);return}if(screen==="champion"){
   if(p.x>92&&p.x<328&&p.y>450&&p.y<504){setupCup();scoreA=scoreB=0;timeLeft=60;gameOver=false;kickoffTeam=0;formation();screen="play";return}
   if(p.x>92&&p.x<328&&p.y>522&&p.y<566){screen="select";return}
   return
 }if(screen==="result"){handleResult(p);return}for(const pl of players){if(pl.team===0&&!pl.goalie&&Math.hypot(p.x-pl.x,p.y-pl.y)<26){switchOrPass(pl.i);return}}for(const b of numBtns){if(Math.hypot(p.x-b.x,p.y-b.y)<31){switchOrPass(b.i);return}}if(Math.hypot(p.x-stick.cx,p.y-stick.cy)<90){pointers.stick=e.pointerId;setStick(p)}else if(Math.hypot(p.x-btnB.x,p.y-btnB.y)<btnB.r+20){pointers.b=e.pointerId;input.shoot=true;btnHold=0}}
function move(e){let p=pos(e);if(e.pointerId===pointers.stick)setStick(p)}
function up(e){if(e.pointerId===pointers.stick){pointers.stick=null;input.x=input.y=0;stick.kx=stick.cx;stick.ky=stick.cy}if(e.pointerId===pointers.b){pointers.b=null;input.shoot=false;input.shootRelease=true}}
function setStick(p){let dx=p.x-stick.cx,dy=p.y-stick.cy,l=Math.hypot(dx,dy),m=Math.min(stick.r,l);stick.kx=stick.cx+(l?dx/l*m:0);stick.ky=stick.cy+(l?dy/l*m:0);input.x=l>8?dx/Math.max(stick.r,l):0;input.y=l>8?dy/Math.max(stick.r,l):0}
canvas.addEventListener("pointerdown",down);canvas.addEventListener("pointermove",move);canvas.addEventListener("pointerup",up);canvas.addEventListener("pointercancel",up);
window.addEventListener("keydown",e=>{if(e.key==="ArrowLeft")input.x=-1;if(e.key==="ArrowRight")input.x=1;if(e.key==="ArrowUp")input.y=-1;if(e.key==="ArrowDown")input.y=1;if("1234".includes(e.key))switchOrPass(Number(e.key));if(e.key.toLowerCase()==="x"){input.shoot=true;btnHold=.3}})
window.addEventListener("keyup",e=>{if(["ArrowLeft","ArrowRight"].includes(e.key))input.x=0;if(["ArrowUp","ArrowDown"].includes(e.key))input.y=0;if(e.key.toLowerCase()==="x"){input.shoot=false;input.shootRelease=true}})
requestAnimationFrame(loop);
})();
</script>
